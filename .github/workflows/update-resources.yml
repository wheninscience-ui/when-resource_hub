name: Update WHEN resources

# Runs every 48 hours (and on manual trigger). Fetches new fellowships,
# refreshes resources.json, and commits it back so the site updates itself.

on:
  schedule:
    - cron: "0 6 */2 * *"   # 06:00 UTC, every 2nd day
  workflow_dispatch:         # lets you run it by hand from the Actions tab

permissions:
  contents: write            # needed so the action can commit resources.json

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run updater
        run: python update_resources.py

      - name: Commit changes if any
        run: |
          git config user.name "when-hub-bot"
          git config user.email "actions@users.noreply.github.com"
          git add resources.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update resources ($(date -u +%Y-%m-%d))"
            git push
          fi
